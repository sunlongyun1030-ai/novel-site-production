# 文件名: /mnt/d/novel-site-production/workers/wrangler.toml
name = "novel-site-proxy"
main = "proxy.js"
compatibility_date = "2024-04-01"

[env.production]
routes = [
  { pattern = "novel-site-d1.pages.dev/*", zone_name = "pages.dev" }
]

# 如果需要使用变量
[vars]
VERCEL_URL = "https://novel-site-omega.vercel.app"
PAGES_URL = "https://novel-site-d1.pages.dev"