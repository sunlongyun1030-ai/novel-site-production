<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简阅小说创作平台</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .loading {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 简阅小说</h1>
        <p>专为5-6年级小学生设计的简约小说创作平台</p>
        
        <div class="spinner"></div>
        <div class="loading">正在加载完整功能...</div>
        
        <a href="/app" class="btn">进入创作平台</a>
        
        <div style="margin-top: 40px; font-size: 0.9em; opacity: 0.7;">
            <p>如果加载时间较长，请耐心等待或刷新页面</p>
            <p>平台基于 Cloudflare Pages + Vercel 混合部署</p>
        </div>
    </div>
    
    <script>
        // 自动重试逻辑
        let retryCount = 0;
        const maxRetries = 3;
        
        function checkAppStatus() {
            fetch('/app')
                .then(response => {
                    if (response.ok) {
                        // 应用已就绪，跳转
                        window.location.href = '/app';
                    } else {
                        retry();
                    }
                })
                .catch(() => {
                    retry();
                });
        }
        
        function retry() {
            retryCount++;
            if (retryCount <= maxRetries) {
                setTimeout(checkAppStatus, 2000);
                document.querySelector('.loading').textContent = 
                    `正在连接服务器... (${retryCount}/${maxRetries})`;
            } else {
                document.querySelector('.loading').textContent = 
                    '连接失败，请点击上方按钮手动进入';
            }
        }
        
        // 页面加载后开始检查
        setTimeout(checkAppStatus, 1000);
        
        // 控制台信息
        console.log('🚀 简阅小说平台加载中...');
        console.log('🌐 使用反向代理访问 Vercel 应用');
        console.log('🔗 用户看到的域名: novel-site-d1.pages.dev');
        console.log('🎯 实际后端: novel-site-omega.vercel.app');
    </script>
</body>
</html>
