<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简阅小说创作平台 - 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        .success {
            color: #48bb78;
            font-size: 5rem;
            margin-bottom: 20px;
        }
        
        p {
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #4299e1;
        }
        
        .feature h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .buttons {
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            background: #c6f6d5;
            border-radius: 8px;
            color: #22543d;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✓</div>
        <h1>简阅小说创作平台</h1>
        <p>专为5-6年级小学生设计的简约小说创作空间</p>
        
        <div class="status">
            ✅ Cloudflare Pages 部署成功！
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>🎨 简约设计</h3>
                <p>界面简洁明了，适合小学生专注创作</p>
            </div>
            <div class="feature">
                <h3>📚 章节管理</h3>
                <p>轻松添加和管理章节内容</p>
            </div>
            <div class="feature">
                <h3>💬 互动评论</h3>
                <p>读者留言，作者回复交流</p>
            </div>
            <div class="feature">
                <h3>🚀 快速部署</h3>
                <p>基于Cloudflare Pages全球加速</p>
            </div>
        </div>
        
        <div class="buttons">
            <a href="https://github.com/sunlongyun1030-ai/novel-site-production" class="btn" target="_blank">查看源代码</a>
            <a href="mailto:your-email@example.com" class="btn">联系开发者</a>
        </div>
        
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; color: #a0aec0; font-size: 0.9rem;">
            <p>版本: 1.0.0 | 部署时间: 2026-04-23</p>
            <p>这是一个静态测试页面，用于验证Cloudflare Pages部署</p>
        </div>
    </div>
</body>
</html>
